<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 260" width="850" height="260">
  <style>
    .title {
      font-family: 'Outfit', 'Inter', 'Segoe UI', system-ui, sans-serif;
      font-weight: 800;
      font-size: 46px;
      fill: #ffffff;
      letter-spacing: -0.5px;
    }
    .subtitle {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      font-weight: 600;
      font-size: 19px;
      fill: #e879f9;
      letter-spacing: 0.5px;
    }
    .tag {
      font-family: 'Fira Code', 'Courier New', monospace;
      font-weight: 500;
      font-size: 14px;
      fill: #38bdf8;
      letter-spacing: -0.2px;
    }
    .glow {
      filter: drop-shadow(0px 0px 12px rgba(217, 70, 239, 0.5));
    }
    .subglow {
      filter: drop-shadow(0px 0px 8px rgba(56, 189, 248, 0.4));
    }
    .connection-line {
      stroke: #3b0764;
      stroke-width: 1.5;
      stroke-dasharray: 6 4;
      animation: dash 30s linear infinite;
    }
    .node {
      fill: #1e1b4b;
      stroke: #d946ef;
      stroke-width: 2;
    }
    .node-active {
      fill: #d946ef;
      filter: drop-shadow(0px 0px 6px #d946ef);
    }
    .node-blue {
      fill: #38bdf8;
      filter: drop-shadow(0px 0px 6px #38bdf8);
    }
  </style>

  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05020c" />
      <stop offset="60%" stop-color="#0c071e" />
      <stop offset="100%" stop-color="#1c0b3a" />
    </linearGradient>
    
    <!-- Title Gradient -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="60%" stop-color="#f5d0fe" />
      <stop offset="100%" stop-color="#f472b6" />
    </linearGradient>

    <!-- Accent Line Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#db2777" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Background Card -->
  <rect width="100%" height="100%" rx="16" fill="url(#bgGrad)" stroke="#2e1065" stroke-width="2.5"/>

  <!-- Tech/Agentic Grid Decoration (Neural Network Vibe) -->
  <g opacity="0.35">
    <line x1="80" y1="50" x2="220" y2="40" class="connection-line" />
    <line x1="220" y1="40" x2="170" y2="150" class="connection-line" />
    <line x1="170" y1="150" x2="80" y2="50" class="connection-line" />
    
    <line x1="720" y1="80" x2="800" y2="160" class="connection-line" />
    <line x1="800" y1="160" x2="680" y2="210" class="connection-line" />
    <line x1="680" y1="210" x2="720" y2="80" class="connection-line" />

    <circle cx="80" cy="50" r="5" class="node-active" />
    <circle cx="220" cy="40" r="4" class="node" />
    <circle cx="170" cy="150" r="6" class="node-blue" />
    
    <circle cx="720" cy="80" r="5" class="node-blue" />
    <circle cx="800" cy="160" r="4" class="node" />
    <circle cx="680" cy="210" r="6" class="node-active" />
  </g>

  <!-- Glowing background blobs -->
  <circle cx="120" cy="130" r="80" fill="#db2777" opacity="0.15" filter="blur(50px)" />
  <circle cx="700" cy="100" r="90" fill="#a855f7" opacity="0.12" filter="blur(60px)" />

  <!-- Info Content -->
  <g transform="translate(75, 90)">
    <!-- Tech Tag -->
    <text x="0" y="0" class="tag subglow">&lt; Gen AI &amp; Automation Engineer /&gt;</text>
    
    <!-- Main Name -->
    <text x="0" y="48" class="title glow" fill="url(#titleGrad)">Abdullah Hameed</text>
    
    <!-- Custom Gradient Accent Bar -->
    <rect x="0" y="65" width="380" height="4" rx="2" fill="url(#accentGrad)" />
    
    <!-- Bio Subtitle -->
    <text x="0" y="98" class="subtitle">Building Intelligent Agents, RAG Pipelines &amp; Automations</text>
  </g>
</svg>
